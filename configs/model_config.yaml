# Website Outage Prediction — model settings (no secrets here)
project_name: website-outage-prediction
target_column: outage_within_1h
quality_gate:
  min_f1_score: 0.75
  min_accuracy: 0.80
features:
  - response_time_ms
  - status_code
  - error_rate
  - latency_p95_ms
  - request_count
  - cpu_usage_percent
  - memory_usage_percent
model:
  type: RandomForestClassifier
  random_state: 42
  n_estimators: 100
  max_depth: 10
