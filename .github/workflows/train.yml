name: Train

on:
  workflow_dispatch:
  schedule:
    # Weekly retrain — Sunday 02:00 UTC
    - cron: "0 2 * * 0"
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "configs/**"
      - "dvc.yaml"

jobs:
  train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Generate data
        run: python scripts/generate_sample_data.py --n-samples 2000

      - name: Train model
        run: python scripts/train_model.py

      - name: Evaluate and quality gate
        run: python scripts/evaluate_model.py

      - name: Upload eval metrics artifact
        uses: actions/upload-artifact@v4
        with:
          name: eval-metrics
          path: data/processed/eval_metrics.json
          retention-days: 30

      - name: Register model (skip if Azure not configured)
        run: python scripts/register_model.py || echo "Registry skipped — Azure not configured"
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AZURE_WORKSPACE_NAME: ${{ secrets.AZURE_WORKSPACE_NAME }}

      - name: Azure login for ACR push
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
        continue-on-error: true

      - name: Build and push Docker image
        env:
          ACR_NAME: ${{ secrets.ACR_NAME }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          if [ -z "$ACR_NAME" ]; then
            echo "ACR_NAME not configured — skipping image push"
            exit 0
          fi
          python scripts/build_image.py --acr "$ACR_NAME" --tag "$IMAGE_TAG" --push
        continue-on-error: true

  drift-check:
    runs-on: ubuntu-latest
    needs: train
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate drift datasets
        run: python scripts/generate_sample_data.py --n-samples 2000

      - name: Run Evidently drift check
        run: python scripts/run_drift_check.py

      - name: Upload drift reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-reports
          path: reports/drift/
          retention-days: 14

      - name: Generate OpenRouter LLM report
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python scripts/openrouter_report.py --drift-report reports/drift/drift_summary.json
        continue-on-error: true

      - name: Upload OpenRouter reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openrouter-reports
          path: reports/openrouter/
          retention-days: 14
