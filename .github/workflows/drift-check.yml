name: Drift Check

on:
  workflow_dispatch:
  schedule:
    # Daily drift check — 06:00 UTC
    - cron: "0 6 * * *"

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate drift datasets
        run: python scripts/generate_sample_data.py --n-samples 2000

      - name: Run Evidently drift check
        id: drift
        run: python scripts/run_drift_check.py

      - name: Upload drift reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-reports
          path: reports/drift/
          retention-days: 14

      - name: Drift alert notification
        if: failure() && steps.drift.outcome == 'failure'
        run: |
          echo "::error::Data drift detected — review reports/drift/drift_report.html"
          echo "Configure GitHub repo notifications or Azure Action Group for email alerts."
