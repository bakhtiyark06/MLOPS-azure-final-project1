name: Deploy to AKS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: false
        default: latest
  workflow_run:
    workflows: ["Train"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success')
    steps:
      - uses: actions/checkout@v4

      - name: Download eval metrics from train workflow
        if: github.event_name == 'workflow_run'
        uses: actions/download-artifact@v4
        with:
          name: eval-metrics
          path: data/processed
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate eval metrics if missing (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: |
          python scripts/generate_sample_data.py --n-samples 500
          python scripts/train_model.py
          python scripts/evaluate_model.py

      - name: Check quality gate
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          path = Path("data/processed/eval_metrics.json")
          if not path.exists():
              print("ERROR: eval_metrics.json not found")
              sys.exit(1)
          metrics = json.loads(path.read_text())
          if not metrics.get("gate_passed"):
              print("ERROR: Quality gate failed — deploy blocked")
              for reason in metrics.get("gate_failure_reasons", []):
                  print(f"  - {reason}")
              sys.exit(1)
          print("Quality gate passed")
          PY

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Deploy to AKS
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
          AKS_CLUSTER_NAME: ${{ secrets.AKS_CLUSTER_NAME }}
          AKS_NAMESPACE: outage-predictor
          ACR_NAME: ${{ secrets.ACR_NAME }}
          IMAGE_TAG: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.event.inputs.image_tag || 'latest' }}
          APPLICATIONINSIGHTS_CONNECTION_STRING: ${{ secrets.APPLICATIONINSIGHTS_CONNECTION_STRING }}
        run: python infra/deploy_aks.py --skip-gate-check --wait-health
