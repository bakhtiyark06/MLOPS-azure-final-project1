name: CI

on:
  push:
    branches: [main, "Sana's-branch"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Generate data and train model for API tests
        run: |
          python scripts/generate_sample_data.py --n-samples 500
          python scripts/train_model.py

      - name: Run pytest with coverage
        run: python -m pytest --cov=src --cov=scripts --cov-report=term-missing --cov-fail-under=70

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Prepare model artifact for Docker
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python scripts/generate_sample_data.py --n-samples 500
          python scripts/train_model.py

      - name: Build Docker image
        run: docker build -t outage-predictor:ci .
